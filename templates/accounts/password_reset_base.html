{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Password Reset — BloodNet{% endblock %}</title>
  <style>
    :root{
      --red:#E23A2E; --red-dark:#C62D22; --green:#1C8A55;
      --text-dark:#2B2F38; --text-muted:#6B6F7B;
      --card-border:#ECE8DF; --input-bg:#FBFAF7;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:'Poppins','Segoe UI',Arial,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 20px;
      color:var(--text-dark);
    }
    a{text-decoration:none}
    .reset-card{
      width:100%;max-width:620px;position:relative;overflow:hidden;
      padding:52px 56px 46px;border-radius:24px;
      background:rgba(255,255,255,.86);border:1px solid rgba(226,58,46,.15);
      box-shadow:0 28px 80px rgba(157,54,62,.14);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    }
    .close-link{
      position:absolute;top:18px;right:20px;width:36px;height:36px;
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      color:var(--red-dark);background:rgba(226,58,46,.08);font-size:1.1rem;
    }
    .reset-icon{
      width:64px;height:64px;margin:0 auto 20px;border-radius:20px;
      display:flex;align-items:center;justify-content:center;color:var(--red);
      background:linear-gradient(145deg,#fff,#ffe4e5);
      box-shadow:0 10px 24px rgba(198,45,34,.12);
    }
    .reset-icon svg{width:30px;height:30px}
    h1{text-align:center;font-size:2rem;margin-bottom:12px}
    .lead{text-align:center;color:var(--text-muted);line-height:1.65;margin:0 auto 30px;max-width:480px}
    .field{margin-bottom:20px}
    .field label{display:block;font-weight:700;margin-bottom:9px}
    .field-wrap{position:relative}
    .field input{
      width:100%;padding:16px 18px;border:1.5px solid var(--card-border);
      border-radius:10px;background:var(--input-bg);font:inherit;color:var(--text-dark);outline:none;
    }
    .field.password-field input{padding-right:56px}
    .field input:focus{border-color:var(--red);box-shadow:0 0 0 4px rgba(226,58,46,.10)}
    .password-toggle{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      width:40px;height:40px;border:0;border-radius:9px;background:transparent;
      color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;
    }
    .password-toggle:hover,.password-toggle:focus-visible{color:var(--red);background:rgba(226,58,46,.08);outline:none}
    .password-toggle svg{width:22px;height:22px}.password-toggle .eye-off{display:none}
    .password-toggle.is-visible .eye-on{display:none}.password-toggle.is-visible .eye-off{display:block}
    .error-list,.field ul{list-style:none;color:var(--red-dark);font-size:.88rem;font-weight:600;margin-top:8px;line-height:1.45}
    .error-banner{padding:12px 15px;margin-bottom:20px;border-radius:9px;background:rgba(226,58,46,.08);color:var(--red-dark);font-weight:600}
    .btn-primary{
      width:100%;padding:17px;border:0;border-radius:10px;color:#fff;font:inherit;font-weight:700;
      background:linear-gradient(135deg,#f5686e,#e5484d 55%,#c92e38);cursor:pointer;
      box-shadow:0 13px 28px rgba(198,45,34,.24);transition:transform .16s ease,box-shadow .16s ease;
    }
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 17px 34px rgba(198,45,34,.31)}
    .back-link{text-align:center;margin-top:26px;color:var(--text-muted)}
    .back-link a{color:var(--red);font-weight:700}
    .success-box{padding:18px;border-radius:12px;background:rgba(28,138,85,.08);color:#176d45;line-height:1.65;margin-bottom:24px;text-align:center}
    .helptext{display:block;color:var(--text-muted);font-size:.86rem;line-height:1.5;margin-top:8px}
    @media(max-width:600px){.reset-card{padding:48px 24px 36px;border-radius:18px}h1{font-size:1.65rem}}
  </style>
  <link rel="stylesheet" href="{% static 'css/bloodnet-theme.css' %}">
</head>
<body class="page-reset">
  <main class="reset-card">
    <a href="{% url 'accounts:login' %}" class="close-link" aria-label="Return to login">&times;</a>
    <div class="reset-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="5" y="10" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="15.5" r="1.5" fill="currentColor"/>
      </svg>
    </div>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
