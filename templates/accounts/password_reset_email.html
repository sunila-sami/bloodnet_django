<!DOCTYPE html>
<html lang="en">
<body style="margin:0;padding:24px;background:#fff5f5;font-family:Arial,sans-serif;color:#322a2c;">
  <div style="max-width:580px;margin:auto;padding:32px;border:1px solid #f1d0d2;border-radius:18px;background:#ffffff;">
    <h2 style="margin:0 0 14px;color:#c92e38;">Reset your BloodNet password</h2>
    <p>Hi {{ user.full_name|default:user.email }},</p>
    <p style="line-height:1.6;">We received a request to reset the password for your BloodNet account.</p>
    <p style="margin:28px 0;text-align:center;">
      <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}" style="display:inline-block;padding:14px 24px;border-radius:9px;background:#e5484d;color:#ffffff;text-decoration:none;font-weight:bold;">Create New Password</a>
    </p>
    <p style="line-height:1.6;color:#74686b;">If you did not request this, ignore this email. Your current password will remain unchanged.</p>
    <p style="margin-top:26px;">BloodNet Team</p>
  </div>
</body>
</html>
